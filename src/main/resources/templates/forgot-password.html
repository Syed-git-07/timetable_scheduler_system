<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Timetable Scheduler</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            /* Beautiful soft colorful gradient */
            background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%);
            color: #334155;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .auth-card {
            /* Elegant Light Glassmorphism */
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 420px;
            padding: 2.5rem;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
        .auth-logo {
            font-size: 2.8rem;
            background: linear-gradient(135deg, #4f46e5 0%, #06b6d4 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
            display: inline-block;
        }
        .form-control {
            border-radius: 8px;
            border: 1px solid #cbd5e1;
            padding: 0.8rem 1rem;
            font-size: 0.95rem;
            background-color: rgba(255, 255, 255, 0.9);
        }
        .form-control:focus {
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.2);
            border-color: #4f46e5;
            background-color: #ffffff;
        }
        .btn-primary {
            background: linear-gradient(135deg, #4f46e5 0%, #6366f1 100%);
            border: none;
            padding: 0.85rem 1rem;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(79, 70, 229, 0.2);
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(79, 70, 229, 0.3);
        }
        .text-accent {
            color: #4f46e5;
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 600;
            transition: color 0.2s;
        }
        .text-accent:hover {
            text-decoration: underline;
            color: #4338ca;
        }
    </style>
</head>
<body>

    <div class="auth-card">
        <div class="text-center mb-4">
            <i class="bi bi-shield-lock-fill auth-logo"></i>
            <h4 class="fw-bold text-dark mt-2">Reset Password</h4>
            <p class="text-muted small">Update your account credentials</p>
        </div>

        <div th:if="${error}" class="alert alert-danger p-2 small text-center" th:text="${error}"></div>

        <form th:action="@{/forgot-password}" method="post">
            <div class="mb-3">
                <label class="form-label small fw-semibold text-secondary">USERNAME</label>
                <input type="text" name="username" class="form-control" placeholder="Enter your username" required>
            </div>
            
            <div class="mb-4">
                <label class="form-label small fw-semibold text-secondary">NEW PASSWORD</label>
                <input type="password" name="newPassword" class="form-control" placeholder="Enter your new password" required>
            </div>

            <button type="submit" class="btn btn-primary w-100 mb-4">Change Password</button>
            
            <div class="text-center">
                <a th:href="@{/login}" class="text-accent"><i class="bi bi-arrow-left me-1"></i> Back to Sign In</a>
            </div>
        </form>
    </div>

</body>
</html>
