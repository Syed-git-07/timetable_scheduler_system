<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Slots | Timetable Scheduler</title>
    <link rel="icon" type="image/jpg" href="nec-logo.jpg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/css/style.css">
</head>

<body class="animate-fade-in">
    <nav class="navbar navbar-expand-lg glass-navbar mb-5">
        <div class="container">
            <a class="navbar-brand" href="/">TIMETABLE <span class="text-white opacity-50">SCHEDULER</span></a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item"><a class="nav-link" href="/"><i class="bi bi-speedometer2 me-1"></i>
                            Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="/teachers"><i class="bi bi-people me-1"></i>
                            Teachers</a></li>
                    <li class="nav-item"><a class="nav-link" href="/subjects"><i class="bi bi-book me-1"></i>
                            Subjects</a></li>
                    <li class="nav-item"><a class="nav-link" href="/rooms"><i class="bi bi-building me-1"></i> Rooms</a>
                    </li>
                    <li class="nav-item"><a class="nav-link active" href="/timeslots"><i class="bi bi-clock me-1"></i>
                            Time Slots</a></li>
                    <li class="nav-item ms-lg-3">
                        <button id="theme-toggle" class="btn" title="Toggle Theme">
                            <i class="bi bi-sun"></i>
                        </button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container pb-5">
        <div class="row g-4">
            <div class="col-lg-4">
                <div class="glass-card mb-3 p-3">
                    <p class="text-muted small fw-bold mb-2">QUICK SETUP</p>
                    <a href="/timeslots/seed" class="vibrant-btn w-100 d-block text-center mb-2">
                        <i class="bi bi-magic me-2"></i>Seed 8-Period Day (9–5:15)
                    </a>
                    <a href="/timeslots/clear" class="btn btn-outline-danger w-100 border-0 opacity-75"
                        onclick="return confirm('Clear ALL time slots?')">
                        <i class="bi bi-trash3 me-2"></i>Clear All Slots
                    </a>
                    <p class="text-muted small text-center mt-2 mb-0">
                        <i class="bi bi-info-circle me-1"></i>Seeding creates 8 periods/day × 5 days with breaks &amp;
                        lunch.
                    </p>
                </div>
                <div class="glass-card">
                    <h4 class="mb-4">Define Time Slot</h4>
                    <form th:action="@{/timeslots/add}" th:object="${timeslot}" method="post">
                        <div class="mb-3">
                            <label class="form-label text-muted small fw-bold">WEEKDAY</label>
                            <select th:field="*{dayOfWeek}" class="form-select" required>
                                <option value="Monday">Monday</option>
                                <option value="Tuesday">Tuesday</option>
                                <option value="Wednesday">Wednesday</option>
                                <option value="Thursday">Thursday</option>
                                <option value="Friday">Friday</option>
                            </select>
                        </div>
                        <div class="row mb-4">
                            <div class="mb-3">
                                <label class="form-label text-muted small fw-bold">START TIME</label>
                                <input type="time" th:field="*{startTime}" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label text-muted small fw-bold">END TIME</label>
                                <input type="time" th:field="*{endTime}" class="form-control" required>
                            </div>
                            <div class="mb-4">
                                <label class="form-label text-muted small fw-bold">PERIOD INDEX (1, 2, 3...)</label>
                                <input type="number" th:field="*{orderIndex}" class="form-control" placeholder="e.g. 1"
                                    required>
                            </div>
                        </div>
                        <button type="submit" class="vibrant-btn w-100">Add Slot <i
                                class="bi bi-plus-lg ms-1"></i></button>
                    </form>
                </div>
            </div>
            <div class="col-lg-8">
                <div class="glass-card">
                    <h4 class="mb-4">Current Schedule Slots</h4>
                    <div class="table-responsive">
                        <table class="table text-white align-middle">
                            <thead>
                                <tr>
                                    <th>Day</th>
                                    <th>Sequence</th>
                                    <th>Start Time</th>
                                    <th>End Time</th>
                                    <th class="text-end">Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="ts : ${timeslots}">
                                    <td class="fw-bold text-accent" th:text="${ts.dayOfWeek}"></td>
                                    <td><span class="badge bg-white bg-opacity-5"
                                            th:text="'Period ' + ${ts.orderIndex}"></span></td>
                                    <td th:text="${ts.startTime}"></td>
                                    <td th:text="${ts.endTime}"></td>
                                    <td class="text-end">
                                        <a th:href="@{/timeslots/delete/{id}(id=${ts.id})}"
                                            class="btn btn-sm btn-outline-danger border-0 opacity-50"><i
                                                class="bi bi-trash"></i></a>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/theme.js"></script>
</body>

</html>
