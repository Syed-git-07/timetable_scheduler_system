<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timetable Scheduler | Student View</title>
    <link rel="icon" type="image/jpg" href="/nec-logo.jpg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/css/style.css">
</head>

<body class="animate-fade-in">
    <nav class="navbar navbar-expand-lg glass-navbar mb-5">
        <div class="container">
            <a class="navbar-brand" href="/view">TIMETABLE <span class="text-white opacity-50">STUDENT</span></a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item ms-lg-3">
                        <button id="theme-toggle" class="btn" title="Toggle Theme">
                            <i class="bi bi-sun"></i>
                        </button>
                    </li>
                    <li class="nav-item ms-lg-2">
                        <a href="/logout" class="btn btn-outline-danger btn-sm rounded-pill px-3"><i class="bi bi-box-arrow-right me-1"></i> Logout</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container pb-5">
        <div class="row justify-content-center">
            <div class="col-lg-6">
                <div class="glass-card mb-4 text-center py-5">
                    <i class="bi bi-calendar-range display-1 text-primary mb-3"></i>
                    <h2 class="mb-3">View Timetable</h2>
                    <p class="text-muted mb-4">Select your class or teacher to view the assigned schedule.</p>
                    
                    <div class="row justify-content-center g-3">
                        <div class="col-md-10 text-start">
                            <label class="form-label text-muted small fw-bold">SEARCH BY CLASS</label>
                            <form action="/view/class" method="get" class="d-flex gap-2">
                                <select name="className" class="form-select">
                                    <option value="CS-101">CS-101</option>
                                    <option value="CS-102">CS-102</option>
                                    <option value="CS-103">CS-103</option>
                                    <option value="CS-201">CS-201</option>
                                    <option value="CS-202">CS-202</option>
                                </select>
                                <button class="vibrant-btn-outline"><i class="bi bi-search"></i> View</button>
                            </form>
                        </div>
                        
                        <div class="col-md-10 text-start mt-4">
                            <label class="form-label text-muted small fw-bold">SEARCH BY TEACHER</label>
                            <form action="/view/teacher" method="get" class="d-flex gap-2">
                                <select name="teacherId" class="form-select">
                                    <option th:each="t : ${teachers}" th:value="${t.id}" th:text="${t.name}"></option>
                                </select>
                                <button class="vibrant-btn-outline"><i class="bi bi-search"></i> View</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/theme.js"></script>
</body>

</html>
