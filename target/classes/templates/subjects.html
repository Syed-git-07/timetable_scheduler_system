<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Subjects | Timetable Scheduler</title>
    <link rel="icon" type="image/jpg" href="nec-logo.jpg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/css/style.css">
</head>

<body class="animate-fade-in">
    <nav class="navbar navbar-expand-lg glass-navbar mb-5">
        <div class="container">
            <a class="navbar-brand" href="/">TIMETABLE <span class="text-white opacity-50">SCHEDULER</span></a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item"><a class="nav-link" href="/"><i class="bi bi-speedometer2 me-1"></i>
                            Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="/teachers"><i class="bi bi-people me-1"></i>
                            Teachers</a></li>
                    <li class="nav-item"><a class="nav-link active" href="/subjects"><i class="bi bi-book me-1"></i>
                            Subjects</a></li>
                    <li class="nav-item"><a class="nav-link" href="/rooms"><i class="bi bi-building me-1"></i> Rooms</a>
                    </li>
                    <li class="nav-item"><a class="nav-link" href="/timeslots"><i class="bi bi-clock me-1"></i> Time
                            Slots</a></li>
                    <li class="nav-item ms-lg-3">
                        <button id="theme-toggle" class="btn" title="Toggle Theme">
                            <i class="bi bi-sun"></i>
                        </button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container pb-5">
        <div class="row g-4">
            <div class="col-lg-4">
                <div class="glass-card">
                    <h4 class="mb-4">Add New Subject</h4>
                    <form th:action="@{/subjects/add}" th:object="${subject}" method="post">
                        <div class="mb-3">
                            <label class="form-label text-muted small fw-bold">SUBJECT NAME</label>
                            <input type="text" th:field="*{name}" class="form-control"
                                placeholder="e.g. Data Structures" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-muted small fw-bold">SUBJECT CODE</label>
                            <input type="text" th:field="*{code}" class="form-control" placeholder="CS201" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-muted small fw-bold">CREDITS</label>
                            <input type="number" th:field="*{credits}" class="form-control" placeholder="e.g. 3" min="0"
                                max="6" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label text-muted small fw-bold">SUBJECT TYPE</label>
                            <select th:field="*{type}" class="form-select" required>
                                <option value="">-- Select Type --</option>
                                <option value="Theory">📚 Theory</option>
                                <option value="Lab">🔬 Lab</option>
                                <option value="Integrated">⚡ Integrated (Theory + Lab)</option>
                            </select>
                            <div class="small text-muted mt-2 p-2"
                                style="background:rgba(255,255,255,0.03);border-radius:8px;border:1px solid rgba(255,255,255,0.07)">
                                <div><i class="bi bi-dot text-accent"></i><strong>Theory:</strong> credits =
                                    periods/week</div>
                                <div><i class="bi bi-dot text-warning"></i><strong>Lab (2 cr):</strong> 4 periods (2
                                    continuous)</div>
                                <div><i class="bi bi-dot text-success"></i><strong>Integrated:</strong> 4 theory + 2
                                    continuous lab</div>
                            </div>
                        </div>
                        <button type="submit" class="vibrant-btn w-100">Add Subject <i
                                class="bi bi-plus-lg ms-1"></i></button>
                    </form>
                </div>
            </div>
            <div class="col-lg-8">
                <div class="glass-card">
                    <h4 class="mb-4">Subject Catalog</h4>
                    <div class="table-responsive">
                        <table class="table text-white align-middle">
                            <thead>
                                <tr>
                                    <th>Code</th>
                                    <th>Name</th>
                                    <th>Type</th>
                                    <th>Credits</th>
                                    <th class="text-end">Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="s : ${subjects}">
                                    <td class="fw-bold text-accent" th:text="${s.code}"></td>
                                    <td th:text="${s.name}"></td>
                                    <td>
                                        <span class="badge border"
                                            th:classappend="${s.type == 'Lab'} ? 'bg-warning bg-opacity-10 text-warning border-warning' : (${s.type == 'Integrated'} ? 'bg-success bg-opacity-10 text-success border-success' : 'bg-info bg-opacity-10 text-info border-info')"
                                            th:text="${s.type ?: 'Theory'}"></span>
                                    </td>
                                    <td>
                                        <span class="badge bg-white bg-opacity-5 text-muted"
                                            th:text="${s.credits} + ' cr'"></span>
                                    </td>
                                    <td class="text-end">
                                        <a th:href="@{/subjects/delete/{id}(id=${s.id})}"
                                            class="btn btn-sm btn-outline-danger border-0 opacity-50"><i
                                                class="bi bi-trash"></i></a>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/theme.js"></script>
</body>

</html>
