<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Subjects | Timetable Scheduler</title>
    <link rel="icon" type="image/jpg" href="nec-logo.jpg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/css/style.css?v=2">
</head>

<body data-theme="dark">
    <nav class="navbar navbar-expand-lg glass-navbar mb-5">
        <div class="container">
            <a class="navbar-brand" href="/">TIMETABLE <span class="text-white opacity-50">SCHEDULER</span></a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item"><a class="nav-link" href="/"><i class="bi bi-speedometer2 me-1"></i> Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="/teachers"><i class="bi bi-people me-1"></i> Teachers</a></li>
                    <li class="nav-item"><a class="nav-link active" href="/subjects"><i class="bi bi-book me-1"></i> Subjects</a></li>
                    <li class="nav-item"><a class="nav-link" href="/rooms"><i class="bi bi-building me-1"></i> Rooms</a></li>
                    <li class="nav-item"><a class="nav-link" href="/timeslots"><i class="bi bi-clock me-1"></i> Time Slots</a></li>
                    <li class="nav-item ms-lg-3">
                        <button id="theme-toggle" class="btn" title="Toggle Theme"><i class="bi bi-sun"></i></button>
                    </li>
                    <li class="nav-item ms-lg-2">
                        <a href="/logout" class="btn btn-outline-danger btn-sm rounded-pill px-3"><i class="bi bi-box-arrow-right me-1"></i> Logout</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container pb-5">
        <div class="row g-4">
            <div class="col-lg-12">
                <div class="glass-card">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h4 class="mb-0">Subject Catalog</h4>
                        <button type="button" class="vibrant-btn py-2 px-3" data-bs-toggle="modal" data-bs-target="#addSubjectModal">
                            <i class="bi bi-plus-lg me-1"></i> Add Subject
                        </button>
                    </div>
                    <div class="table-responsive">
                        <table class="table align-middle">
                            <thead>
                                <tr>
                                    <th>Code</th>
                                    <th>Name</th>
                                    <th>Type</th>
                                    <th>Credits</th>
                                    <th>Periods/Wk</th>
                                    <th class="text-end">Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="s : ${subjects}">
                                    <td class="fw-bold text-accent" th:text="${s.code}"></td>
                                    <td th:text="${s.name}"></td>
                                    <td>
                                        <span class="badge border"
                                            th:classappend="${s.type == 'Lab'} ? 'bg-warning bg-opacity-10 text-warning border-warning' : (${s.type == 'Integrated'} ? 'bg-success bg-opacity-10 text-success border-success' : 'bg-info bg-opacity-10 text-info border-info')"
                                            th:text="${s.type ?: 'Theory'}"></span>
                                    </td>
                                    <td>
                                        <!-- Credits: theme-aware pill -->
                                        <span class="period-pill" th:text="${s.credits} + ' cr'"></span>
                                    </td>
                                    <td>
                                        <!-- Periods/week: theme-aware pill with accent -->
                                        <span class="period-pill accent" th:text="${s.periodsPerWeek}"></span>
                                    </td>
                                    <td class="text-end">
                                        <button type="button" class="btn btn-sm btn-outline-primary border-0 opacity-75" data-bs-toggle="modal" th:data-bs-target="'#editSubjectModal' + ${s.id}">
                                            <i class="bi bi-pencil"></i>
                                        </button>
                                        <a th:href="@{/subjects/delete/{id}(id=${s.id})}" class="btn btn-sm btn-outline-danger border-0 opacity-50"><i class="bi bi-trash"></i></a>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Add Subject Modal -->
    <div class="modal fade text-start" id="addSubjectModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content theme-modal">
                <div class="modal-header theme-modal-header">
                    <h5 class="modal-title fw-bold">Add New Subject</h5>
                    <button type="button" class="btn-close theme-btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <form th:action="@{/subjects/add}" method="post">
                    <div class="modal-body py-4">
                        <div class="mb-3">
                            <label class="form-label">SUBJECT NAME</label>
                            <input type="text" name="name" class="form-control" placeholder="e.g. Data Structures" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">SUBJECT CODE</label>
                            <input type="text" name="code" class="form-control" placeholder="CS201" required>
                        </div>
                        <div class="row">
                            <div class="col-6 mb-3">
                                <label class="form-label">CREDITS</label>
                                <input type="number" name="credits" class="form-control" placeholder="e.g. 3" min="0" max="10" required>
                            </div>
                            <div class="col-6 mb-3">
                                <label class="form-label">PERIODS/WEEK</label>
                                <input type="number" name="periodsPerWeek" class="form-control" placeholder="e.g. 2" min="1" max="15" required>
                            </div>
                        </div>
                        <div class="mb-4">
                            <label class="form-label">SUBJECT TYPE</label>
                            <select name="type" class="form-select" required>
                                <option value="">-- Select Type --</option>
                                <option value="Theory">📚 Theory</option>
                                <option value="Lab">🔬 Lab</option>
                                <option value="Integrated">⚡ Integrated (Theory + Lab)</option>
                            </select>
                        </div>
                    </div>
                    <div class="modal-footer theme-modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="vibrant-btn px-4">Add Subject</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Edit Subject Modals -->
    <th:block th:each="s : ${subjects}">
        <div class="modal fade text-start" th:id="'editSubjectModal' + ${s.id}" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content theme-modal">
                    <div class="modal-header theme-modal-header">
                        <h5 class="modal-title fw-bold">Edit Subject</h5>
                        <button type="button" class="btn-close theme-btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <form th:action="@{/subjects/edit}" method="post">
                        <input type="hidden" name="id" th:value="${s.id}">
                        <div class="modal-body py-4">
                            <div class="mb-3">
                                <label class="form-label">SUBJECT NAME</label>
                                <input type="text" name="name" th:value="${s.name}" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">SUBJECT CODE</label>
                                <input type="text" name="code" th:value="${s.code}" class="form-control" required>
                            </div>
                            <div class="row">
                                <div class="col-6 mb-3">
                                    <label class="form-label">CREDITS</label>
                                    <input type="number" name="credits" th:value="${s.credits}" class="form-control" min="0" max="10" required>
                                </div>
                                <div class="col-6 mb-3">
                                    <label class="form-label">PERIODS/WEEK</label>
                                    <input type="number" name="periodsPerWeek" th:value="${s.periodsPerWeek}" class="form-control" min="1" max="15" required>
                                </div>
                            </div>
                            <div class="mb-4">
                                <label class="form-label">SUBJECT TYPE</label>
                                <select name="type" class="form-select" required>
                                    <option value="Theory" th:selected="${s.type == 'Theory'}">📚 Theory</option>
                                    <option value="Lab" th:selected="${s.type == 'Lab'}">🔬 Lab</option>
                                    <option value="Integrated" th:selected="${s.type == 'Integrated'}">⚡ Integrated (Theory + Lab)</option>
                                </select>
                            </div>
                        </div>
                        <div class="modal-footer theme-modal-footer">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                            <button type="submit" class="vibrant-btn px-4">Save Changes</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </th:block>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/theme.js"></script>
</body>

</html>
