<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schedule View | Timetable Scheduler</title>
    <link rel="icon" type="image/jpg" href="nec-logo.jpg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js" integrity="sha512-GsLlZN/3F2ErC5ifS5QtgpiJtWd43JWSuIgh7mbzZ8zBps+dvLusV+eNQATqgA/HdeKFVgA5v3S/cIrLF7QnIg==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js" integrity="sha512-BNaRQnYJYiPSqHHDb58B0yaPfCu+Wgds8Gp/gU33kqBtgNS4tSPHuGibyoeqMV/TJlSK74T+02wD1LqI2iB95w==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
</head>

<body class="animate-fade-in">
    <nav class="navbar navbar-expand-lg glass-navbar mb-5">
        <div class="container">
            <a class="navbar-brand" href="/">TIMETABLE <span class="text-white opacity-50">SCHEDULER</span></a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item" th:if="${session.role == 'ADMIN'}"><a class="nav-link" href="/"><i class="bi bi-speedometer2 me-1"></i> Dashboard</a></li>
                    <li class="nav-item" th:if="${session.role == 'ADMIN'}"><a class="nav-link" href="/teachers"><i class="bi bi-people me-1"></i> Teachers</a></li>
                    <li class="nav-item" th:if="${session.role == 'ADMIN'}"><a class="nav-link" href="/subjects"><i class="bi bi-book me-1"></i> Subjects</a></li>
                    <li class="nav-item" th:if="${session.role == 'ADMIN'}"><a class="nav-link" href="/rooms"><i class="bi bi-building me-1"></i> Rooms</a></li>
                    <li class="nav-item" th:if="${session.role == 'ADMIN'}"><a class="nav-link" href="/timeslots"><i class="bi bi-clock me-1"></i> Time Slots</a></li>
                    
                    <li class="nav-item" th:if="${session.role == 'STUDENT'}"><a class="nav-link" href="/view"><i class="bi bi-house me-1"></i> Student Home</a></li>
                    <li class="nav-item ms-lg-3">
                        <button id="theme-toggle" class="btn" title="Toggle Theme">
                            <i class="bi bi-sun"></i>
                        </button>
                    </li>
                    <li class="nav-item ms-lg-2">
                        <a href="/logout" class="btn btn-outline-danger btn-sm rounded-pill px-3"><i class="bi bi-box-arrow-right me-1"></i> Logout</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container pb-5">
        <div class="glass-card mb-4">
            <div class="d-flex justify-content-between align-items-center flex-wrap gap-3">
                <h4 class="mb-0">
                    <span class="text-muted small fw-normal">VIEWING:</span>
                    <span th:text="${viewType}" class="text-accent ms-1"></span>
                </h4>
                <div class="d-flex gap-2">
                    <button class="btn btn-outline-success btn-sm" onclick="exportToImage()"><i class="bi bi-file-image me-1"></i> Export JPG</button>
                    <button class="btn btn-outline-danger btn-sm" onclick="exportToPDF()"><i class="bi bi-file-pdf me-1"></i> Export PDF</button>
                    <a href="javascript:history.back()" class="vibrant-btn-outline btn-sm"><i class="bi bi-arrow-left"></i> Back</a>
                </div>
            </div>
        </div>

        <div class="glass-card overflow-hidden" style="padding: 0;">
            <div class="table-responsive p-4" id="timetable-content" style="background: var(--card-bg);">
                
                <div class="text-center mb-4 d-none export-header">
                    <h2 class="fw-bold" style="color: var(--text-main);">Timetable Scheduler System</h2>
                    <h4 class="text-muted" th:text="${viewType}"></h4>
                </div>

                <table class="table table-bordered text-center align-middle mb-0" style="table-layout: fixed; border-color: var(--border-color);">
                    <thead style="background: rgba(79, 70, 229, 0.05);">
                        <tr>
                            <th style="width: 120px; font-weight: 700; color: var(--primary);">Day / Period</th>
                            <th th:each="pIndex : ${periodIndices}" style="color: var(--text-main);">
                                <div class="fw-bold mb-1">Period [[${pIndex}]]</div>
                                <div class="small text-muted" style="font-size: 0.75rem;" th:text="${periodTimes[pIndex]}"></div>
                            </th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="day : ${days}">
                            <th class="fw-bold text-primary" style="background: rgba(79, 70, 229, 0.02);" th:text="${day}"></th>
                            <td th:each="pIndex : ${periodIndices}">
                                <div th:if="${gridMap.get(day).get(pIndex) != null}">
                                    <div class="fw-bold text-accent mb-1" th:text="${gridMap.get(day).get(pIndex).subject.name}"></div>
                                    <div class="small text-muted mb-1" th:text="${gridMap.get(day).get(pIndex).teacher.name}"></div>
                                    <span class="badge border" style="color: var(--text-main); background: rgba(0,0,0,0.05);" th:text="${gridMap.get(day).get(pIndex).room.roomNumber}"></span>
                                </div>
                                <div th:if="${gridMap.get(day).get(pIndex) == null}" class="text-muted fst-italic" style="opacity: 0.5; font-size: 0.85rem;">
                                    Free Period
                                </div>
                            </td>
                        </tr>
                        <tr th:if="${days.empty}">
                            <td th:colspan="${periodIndices.size() + 1}" class="text-center py-5 text-muted italic">
                                <i class="bi bi-exclamation-triangle fs-2 d-block mb-2"></i>
                                No assignments found for this view.
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/theme.js"></script>
    <script>
        function exportToPDF() {
            const element = document.getElementById('timetable-content');
            element.querySelector('.export-header').classList.remove('d-none');
            const opt = {
                margin:       0.5,
                filename:     'timetable.pdf',
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 2, useCORS: true },
                jsPDF:        { unit: 'in', format: 'letter', orientation: 'landscape' }
            };
            html2pdf().set(opt).from(element).save().then(() => {
                element.querySelector('.export-header').classList.add('d-none');
            });
        }

        function exportToImage() {
            const element = document.getElementById('timetable-content');
            element.querySelector('.export-header').classList.remove('d-none');
            html2canvas(element, { scale: 2, useCORS: true }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'timetable.jpg';
                link.href = canvas.toDataURL('image/jpeg', 0.9);
                link.click();
                element.querySelector('.export-header').classList.add('d-none');
            });
        }
    </script>
</body>

</html>
