<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schedule View | Timetable Scheduler</title>
    <link rel="icon" type="image/jpg" href="nec-logo.jpg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/css/style.css">
</head>

<body class="animate-fade-in">
    <nav class="navbar navbar-expand-lg glass-navbar mb-5">
        <div class="container">
            <a class="navbar-brand" href="/">TIMETABLE <span class="text-white opacity-50">SCHEDULER</span></a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item"><a class="nav-link" href="/"><i class="bi bi-speedometer2 me-1"></i>
                            Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="/teachers"><i class="bi bi-people me-1"></i>
                            Teachers</a></li>
                    <li class="nav-item"><a class="nav-link" href="/subjects"><i class="bi bi-book me-1"></i>
                            Subjects</a></li>
                    <li class="nav-item"><a class="nav-link" href="/rooms"><i class="bi bi-building me-1"></i> Rooms</a>
                    </li>
                    <li class="nav-item"><a class="nav-link" href="/timeslots"><i class="bi bi-clock me-1"></i> Time
                            Slots</a></li>
                    <li class="nav-item ms-lg-3">
                        <button id="theme-toggle" class="btn" title="Toggle Theme">
                            <i class="bi bi-sun"></i>
                        </button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container pb-5">
        <div class="glass-card mb-4">
            <div class="d-flex justify-content-between align-items-center flex-wrap gap-3">
                <h4 class="mb-0">
                    <span class="text-muted small fw-normal">VIEWING:</span>
                    <span th:text="${viewType}" class="text-accent ms-1"></span>
                </h4>
                <a href="/" class="vibrant-btn-outline btn-sm"><i class="bi bi-arrow-left"></i> Back to Dashboard</a>
            </div>
        </div>

        <div class="glass-card">
            <div class="table-responsive">
                <table class="table text-white align-middle">
                    <thead>
                        <tr>
                            <th>Time Slot</th>
                            <th>Subject</th>
                            <th>Teacher</th>
                            <th>Room</th>
                            <th>Class</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="e : ${entries}">
                            <td>
                                <div class="badge bg-primary bg-opacity-25 text-primary px-3 py-2 mb-1"
                                    th:text="${e.timeSlot?.dayOfWeek ?: 'Unknown'}"></div>
                                <div class="small text-muted"><i class="bi bi-clock me-1 opacity-50"></i> <span
                                        th:text="${(e.timeSlot?.startTime ?: '--') + ' - ' + (e.timeSlot?.endTime ?: '--')}"></span>
                                </div>
                            </td>
                            <td><span class="fw-bold text-accent" th:text="${e.subject?.name ?: 'No Subject'}"></span>
                                <br><small class="text-muted" th:text="'(' + ${e.subject?.code ?: 'N/A'} + ')'"></small>
                            </td>
                            <td th:text="${e.teacher?.name ?: 'No Teacher'}"></td>
                            <td th:text="${e.room?.roomNumber ?: 'No Room'}"></td>
                            <td><span class="badge bg-white bg-opacity-5 border border-white border-opacity-10"
                                    th:text="${e.className ?: 'N/A'}"></span></td>
                        </tr>
                        <tr th:if="${entries.empty}">
                            <td colspan="5" class="text-center py-5 text-muted italic">
                                <i class="bi bi-exclamation-triangle fs-2 d-block mb-2"></i>
                                No assignments found for this view.
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/theme.js"></script>
</body>

</html>
