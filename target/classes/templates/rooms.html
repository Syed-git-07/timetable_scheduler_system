<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Rooms | Timetable Scheduler</title>
    <link rel="icon" type="image/jpg" href="nec-logo.jpg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/css/style.css">
</head>

<body class="animate-fade-in">
    <nav class="navbar navbar-expand-lg glass-navbar mb-5">
        <div class="container">
            <a class="navbar-brand" href="/">TIMETABLE <span class="text-white opacity-50">SCHEDULER</span></a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item"><a class="nav-link" href="/"><i class="bi bi-speedometer2 me-1"></i>
                            Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="/teachers"><i class="bi bi-people me-1"></i>
                            Teachers</a></li>
                    <li class="nav-item"><a class="nav-link" href="/subjects"><i class="bi bi-book me-1"></i>
                            Subjects</a></li>
                    <li class="nav-item"><a class="nav-link active" href="/rooms"><i class="bi bi-building me-1"></i>
                            Rooms</a></li>
                    <li class="nav-item"><a class="nav-link" href="/timeslots"><i class="bi bi-clock me-1"></i> Time
                            Slots</a></li>
                    <li class="nav-item ms-lg-3">
                        <button id="theme-toggle" class="btn" title="Toggle Theme">
                            <i class="bi bi-sun"></i>
                        </button>
                    </li>
                    <li class="nav-item ms-lg-2">
                        <a href="/logout" class="btn btn-outline-danger btn-sm rounded-pill px-3"><i class="bi bi-box-arrow-right me-1"></i> Logout</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container pb-5">
        <div class="row g-4">
            <div class="col-lg-4">
                <div class="glass-card">
                    <h4 class="mb-4">Add New Room</h4>
                    <form th:action="@{/rooms/add}" th:object="${room}" method="post">
                        <div class="mb-3">
                            <label class="form-label text-muted small fw-bold">ROOM NUMBER</label>
                            <input type="text" th:field="*{roomNumber}" class="form-control" placeholder="e.g. 301-A"
                                required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-muted small fw-bold">CAPACITY</label>
                            <input type="number" th:field="*{capacity}" class="form-control" placeholder="e.g. 50"
                                required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label text-muted small fw-bold">ROOM TYPE</label>
                            <select th:field="*{type}" class="form-select">
                                <option value="Classroom">Classroom</option>
                                <option value="Lab">Lab</option>
                                <option value="Auditorium">Auditorium</option>
                            </select>
                        </div>
                        <button type="submit" class="vibrant-btn w-100">Add Room <i
                                class="bi bi-plus-lg ms-1"></i></button>
                    </form>
                </div>
            </div>
            <div class="col-lg-8">
                <div class="glass-card">
                    <h4 class="mb-4">Campus Rooms</h4>
                    <div class="table-responsive">
                        <table class="table text-white align-middle">
                            <thead>
                                <tr>
                                    <th>Room #</th>
                                    <th>Capacity</th>
                                    <th>Type</th>
                                    <th>Status</th>
                                    <th class="text-end">Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="r : ${rooms}">
                                    <td class="fw-medium" th:text="${r.roomNumber}"></td>
                                    <td th:text="${r.capacity}"></td>
                                    <td><span
                                            class="badge bg-white bg-opacity-5 border border-white border-opacity-10 text-muted"
                                            th:text="${r.type}"></span></td>
                                    <td>
                                        <a th:href="@{/rooms/toggle/{id}(id=${r.id})}"
                                            class="badge text-decoration-none border"
                                            th:classappend="${r.available} ? 'bg-success bg-opacity-10 text-success border-success' : 'bg-danger bg-opacity-10 text-danger border-danger'"
                                            th:text="${r.available} ? 'Operational' : 'Unavailable'"></a>
                                    </td>
                                    <td class="text-end">
                                        <a th:href="@{/rooms/delete/{id}(id=${r.id})}"
                                            class="btn btn-sm btn-outline-danger border-0 opacity-50"><i
                                                class="bi bi-trash"></i></a>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/theme.js"></script>
</body>

</html>
